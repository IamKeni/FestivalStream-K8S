apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-interface
  namespace: applicatie
  labels:
    app: web-interface
spec:
  replicas: 2

  selector:
    matchLabels:
      app: web-interface

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: web-interface

    spec:
      serviceAccountName: web-sa

      containers:
      - name: web-interface
        image: nginx:1.25-alpine

        ports:
        - containerPort: 80

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

        livenessProbe:
          tcpSocket:
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 15

        readinessProbe:
          tcpSocket:
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10

        volumeMounts:
        - name: web-data
          mountPath: /usr/share/nginx/html

      volumes:
      - name: web-data
        persistentVolumeClaim:
          claimName: web-storage
