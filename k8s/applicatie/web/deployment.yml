apiVersion: v1
kind: ConfigMap
metadata:
  name: web-html
  namespace: applicatie
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <title>Web Interface</title>
    </head>
    <body>
      <h1>FestivalStream - Web Interface</h1>
      <p>Web Interface is online.</p>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-interface
  namespace: applicatie
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-interface
  template:
    metadata:
      labels:
        app: web-interface
    spec:
      serviceAccountName: web-sa
      containers:
      - name: nginx
        image: nginx:1.27-alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html
        configMap:
          name: web-html
---
apiVersion: v1
kind: Service
metadata:
  name: web-interface
  namespace: applicatie
spec:
  selector:
    app: web-interface
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web-interface
  namespace: applicatie
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /web
        pathType: Prefix
        backend:
          service:
            name: web-interface
            port:
              number: 80
