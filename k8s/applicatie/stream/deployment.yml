apiVersion: apps/v1
kind: Deployment
metadata:
  name: streaming-vod-service
  namespace: applicatie
  labels:
    app: streaming-vod-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: streaming-vod-service

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: streaming-vod-service

    spec:
      serviceAccountName: web-sa

      containers:
      - name: streaming-vod-service
        image: nginx:1.25-alpine

        ports:
        - containerPort: 80

        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi

        livenessProbe:
          tcpSocket:
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 15

        readinessProbe:
          tcpSocket:
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10

        volumeMounts:
        - name: stream-data
          mountPath: /data/streams

      volumes:
      - name: stream-data
        persistentVolumeClaim:
          claimName: stream-storage
