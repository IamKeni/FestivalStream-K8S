apiVersion: apps/v1
kind: Deployment
metadata:
  name: streaming-vod-service
  namespace: applicatie
spec:
  replicas: 2
  selector:
    matchLabels:
      app: streaming-vod-service
  template:
    metadata:
      labels:
        app: streaming-vod-service
    spec:
      serviceAccountName: web-sa
      containers:
      - name: nginx
        image: nginx:1.27-alpine
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: streaming-vod-service
  namespace: applicatie
spec:
  selector:
    app: streaming-vod-service
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: streaming-vod-service
  namespace: applicatie
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /stream
        pathType: Prefix
        backend:
          service:
            name: streaming-vod-service
            port:
              number: 80
