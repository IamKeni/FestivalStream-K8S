apiVersion: v1
kind: ConfigMap
metadata:
  name: festival-info-html
  namespace: applicatie
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="nl">
    <head>
      <meta charset="UTF-8">
      <title>FestivalStream</title>
    </head>
    <body>
      <h1>FestivalStream</h1>
      <p>Live streaming platform voor festivals</p>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: festival-info
  namespace: applicatie
spec:
  replicas: 1
  selector:
    matchLabels:
      app: festival-info
  template:
    metadata:
      labels:
        app: festival-info
    spec:
      serviceAccountName: web-sa
      containers:
      - name: nginx
        image: nginx:1.27-alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html
        configMap:
          name: festival-info-html
---
apiVersion: v1
kind: Service
metadata:
  name: festival-info
  namespace: applicatie
spec:
  selector:
    app: festival-info
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: festival-info
  namespace: applicatie
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /festival
        pathType: Prefix
        backend:
          service:
            name: festival-info
            port:
              number: 80
