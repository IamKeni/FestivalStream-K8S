---

# Ubuntu 24.04 (noble) ships AppArmor profiles that block containerd's CRI socket
# unless we use containerd.io from Docker's repo (>= 1.7) with a clean config.

- name: Benodigde packages installeren
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - apparmor        # vereist op Ubuntu 24.04
    state: present
    update_cache: true

- name: /etc/apt/keyrings directory aanmaken
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Docker GPG-sleutel downloaden en opslaan
  ansible.builtin.shell: |
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | \
      gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    chmod a+r /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg

- name: Docker APT-repository toevoegen
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/docker.list
    content: |
      deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu noble stable

- name: containerd.io installeren
  ansible.builtin.apt:
    name: containerd.io
    state: present
    update_cache: true

- name: /etc/containerd directory aanmaken
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    mode: '0755'

# Altijd de config opnieuw genereren — nooit de creates: guard gebruiken,
# want dan wordt een verouderde config nooit bijgewerkt.
- name: Standaard containerd config genereren
  ansible.builtin.shell: |
    containerd config default > /etc/containerd/config.toml
  changed_when: true
  notify: restart containerd

# Ubuntu 24.04 zet CRI standaard uit in de gegenereerde config — dit fikt het.
- name: disabled_plugins CRI verwijderen
  ansible.builtin.replace:
    path: /etc/containerd/config.toml
    regexp: '^\s*disabled_plugins\s*=\s*\[.*"cri".*\]\s*$'
    replace: 'disabled_plugins = []'
  notify: restart containerd

- name: SystemdCgroup inschakelen
  ansible.builtin.replace:
    path: /etc/containerd/config.toml
    regexp: 'SystemdCgroup = false'
    replace: 'SystemdCgroup = true'
  notify: restart containerd

# Ubuntu 24.04: de sandbox image moet expliciet gezet worden,
# anders pakt containerd soms een incompatibele versie.
- name: Sandbox image instellen (pause container)
  ansible.builtin.replace:
    path: /etc/containerd/config.toml
    regexp: 'sandbox_image = ".*"'
    replace: 'sandbox_image = "registry.k8s.io/pause:3.9"'
  notify: restart containerd

- name: Handlers direct uitvoeren (containerd herstarten voor kubeadm)
  meta: flush_handlers

- name: containerd starten en inschakelen
  ansible.builtin.systemd:
    name: containerd
    state: started
    enabled: true

# Expliciete check: misluk vroeg als de CRI socket niet beschikbaar is.
- name: Wachten tot containerd CRI socket beschikbaar is
  ansible.builtin.wait_for:
    path: /var/run/containerd/containerd.sock
    state: present
    timeout: 30
